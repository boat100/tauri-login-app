<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 登录页面 -->
    <div id="loginPage" class="page active">
      <div class="login-card">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
            </svg>
          </div>
          <h1>欢迎回来</h1>
          <p>请登录您的账户</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="loginUsername">用户名</label>
            <div class="input-wrapper">
              <input type="text" id="loginUsername" placeholder="请输入用户名" required>
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label for="loginPassword">密码</label>
            <div class="input-wrapper">
              <input type="password" id="loginPassword" placeholder="请输入密码" required>
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
              </svg>
            </div>
          </div>

          <button type="submit" class="btn primary" id="loginBtn">
            <span class="spinner"></span>
            <span class="btn-text">登 录</span>
          </button>

          <div class="message" id="loginMessage"></div>

          <div class="switch-link">
            还没有账户？<a href="#" id="showRegister">立即注册</a>
          </div>
        </form>
      </div>
    </div>

    <!-- 注册页面 -->
    <div id="registerPage" class="page">
      <div class="login-card">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
          </div>
          <h1>创建账户</h1>
          <p>注册一个新账户</p>
        </div>

        <form id="registerForm">
          <div class="form-group">
            <label for="regUsername">用户名</label>
            <div class="input-wrapper">
              <input type="text" id="regUsername" placeholder="请输入用户名" required minlength="3">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label for="regPassword">密码</label>
            <div class="input-wrapper">
              <input type="password" id="regPassword" placeholder="请输入密码" required minlength="6">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label for="regConfirmPassword">确认密码</label>
            <div class="input-wrapper">
              <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" required>
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
              </svg>
            </div>
          </div>

          <button type="submit" class="btn primary" id="registerBtn">
            <span class="spinner"></span>
            <span class="btn-text">注 册</span>
          </button>

          <div class="message" id="registerMessage"></div>

          <div class="switch-link">
            已有账户？<a href="#" id="showLogin">立即登录</a>
          </div>
        </form>
      </div>
    </div>

    <!-- 成功页面 -->
    <div id="successPage" class="page">
      <div class="login-card success-card">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>
        <h1>登录成功！</h1>
        <p id="welcomeText">欢迎回来</p>
        <div class="user-info">
          <p><strong>用户名：</strong><span id="displayUsername"></span></p>
          <p><strong>角色：</strong><span id="displayRole"></span></p>
        </div>
        <button class="btn secondary" id="logoutBtn">退出登录</button>
      </div>
    </div>
  </div>

  <div class="demo-info">
    <p><strong>演示账号：</strong>admin / admin123</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
